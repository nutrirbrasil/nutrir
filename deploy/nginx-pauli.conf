# Nginx — pauli.nutrirpicarras.com.br
# Copie para /etc/nginx/sites-available/pauli na VPS
#
# Certificado Cloudflare Origin (mesmo do Nutrir):
#   /etc/ssl/cloudflare/nutrirpicarras.pem
#   /etc/ssl/cloudflare/nutrirpicarras.key

server {
    listen 80;
    listen [::]:80;
    server_name pauli.nutrirpicarras.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pauli.nutrirpicarras.com.br;

    ssl_certificate     /etc/ssl/cloudflare/nutrirpicarras.pem;
    ssl_certificate_key /etc/ssl/cloudflare/nutrirpicarras.key;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

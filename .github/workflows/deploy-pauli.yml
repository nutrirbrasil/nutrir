name: Deploy Paula site

on:
  push:
    branches: [main]
    paths:
      - "pauli/**"
      - ".github/workflows/deploy-pauli.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PAULI_VPS_HOST }}
          username: ${{ secrets.PAULI_VPS_USER }}
          key: ${{ secrets.PAULI_VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/nutricao
            git fetch origin main
            git reset --hard origin/main
            echo "Commit: $(git log -1 --oneline)"
            echo "Posts:"
            ls -la pauli/content/blog/ || true
            cd pauli
            npm ci
            npm run build
            pm2 restart pauli-web
            echo "Deploy concluído."

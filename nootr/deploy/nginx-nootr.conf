# nginx do Nootr, template. NÃO aplicado automaticamente (blast radius da VPS
# compartilhada). Copiar para /etc/nginx/sites-available/nootr, ajustar os
# domínios/certs e habilitar com `ln -s` + `nginx -t` + `systemctl reload nginx`.
#
# Importante: como o frontend virou client-side (o browser chama a API direto),
# a API precisa de host público próprio. Por isso DOIS server blocks:
#   - nootr.nutrirpicarras.com.br        -> Next  (127.0.0.1:3003)
#   - nootr-api.nutrirpicarras.com.br    -> FastAPI(127.0.0.1:8010)
# E o frontend deve ser buildado com
#   NEXT_PUBLIC_NOOTR_API_URL=https://nootr-api.nutrirpicarras.com.br
# e o backend com
#   EXTRA_CORS_ORIGINS=https://nootr.nutrirpicarras.com.br

server {
    server_name nootr.nutrirpicarras.com.br;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # TLS: gerenciado pelo certbot (mesmo padrão de nutrir/pauli).
    listen 80;
}

server {
    server_name nootr-api.nutrirpicarras.com.br;

    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 80;
}
